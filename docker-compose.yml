version: '3.9'

# ── Open Fabric Studio — Release Deployment ───────────────────────────────────
# Usage:
#   ./install.sh          # first-time setup (auto-generates secrets + starts)
#   docker compose up -d  # subsequent starts
#   docker compose down   # stop all services
#   docker compose pull   # pull latest images for an upgrade
#
# Images are pulled automatically from GitHub Container Registry.
# No source code or build tools are required.

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ofs
      POSTGRES_USER:     ofs
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ofs -d ofs"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    image: ghcr.io/chrisjlapp/ofs-backend:v1.1.2
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:                  production
      PORT:                      3001
      DATABASE_URL:              postgresql://ofs:${POSTGRES_PASSWORD}@db:5432/ofs
      JWT_SECRET:                ${JWT_SECRET:?JWT_SECRET is required}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:?CREDENTIAL_ENCRYPTION_KEY is required}
      CORS_ORIGINS:              ${CORS_ORIGINS:-http://localhost}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  renderer:
    image: ghcr.io/chrisjlapp/ofs-renderer:v1.1.2
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
